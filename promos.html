<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promos del día · AR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a1a;
    --text-muted: #666;
    --text-faint: #999;
    --accent: #1a1a1a;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --amber-bg: #faeeda;
    --amber-text: #854f0b;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 99px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container { max-width: 640px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .date-label { font-size: 12px; color: var(--text-muted); }

  .section-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    margin: 0 0 8px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1.25rem; }
  .chip {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  hr { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

  .search-btn {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: -0.01em;
  }
  .search-btn:hover { opacity: 0.85; }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status { font-size: 13px; color: var(--text-muted); text-align: center; padding: 2rem 0; }

  .cards { display: grid; gap: 10px; margin-top: 1.25rem; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .card-title { font-size: 15px; font-weight: 500; line-height: 1.3; }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 500;
  }
  .badge-super { background: var(--green-bg); color: var(--green-text); }
  .badge-delivery { background: var(--amber-bg); color: var(--amber-text); }
  .badge-hoy { background: var(--blue-bg); color: var(--blue-text); }
  .card-desc { font-size: 13px; color: var(--text-muted); margin: 0 0 10px; line-height: 1.6; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-muted);
    border: 0.5px solid var(--border);
  }
  .tag-hi { background: var(--amber-bg); color: var(--amber-text); border-color: transparent; font-weight: 500; }
  .card-link { font-size: 12px; color: var(--blue-text); text-decoration: none; }
  .card-link:hover { text-decoration: underline; }

  .disclaimer {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 1.25rem;
    line-height: 1.6;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }

  .footer { font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 3rem; }
  .footer a { color: var(--text-faint); text-decoration: none; }
  .footer a:hover { color: var(--text-muted); }

  /* Claude chat overlay */
  #claude-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 1rem;
  }
  #claude-panel.open { display: flex; }
  .claude-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .claude-box h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .claude-msg { font-size: 13px; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; }
  .claude-close {
    margin-top: 1.25rem;
    width: 100%;
    padding: 10px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    body { padding: 1.25rem 0.75rem 3rem; }
    h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-top">
      <h1>Promos del día</h1>
      <span class="date-label" id="fecha"></span>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-top:2px;">Argentina · Supermercados y delivery</p>
  </header>

  <p class="section-label">Categoría</p>
  <div class="chips" id="cats">
    <span class="chip active" data-val="supermercados (Coto, Carrefour, Disco, Dia)">Supermercados</span>
    <span class="chip active" data-val="delivery (Pedidos Ya, Rappi)">Delivery</span>
    <span class="chip disabled">Ropa masc.</span>
    <span class="chip disabled">Ropa fem.</span>
    <span class="chip disabled">Electrónica</span>
    <span class="chip disabled">Farmacia</span>
    <span class="chip disabled">Combustible</span>
  </div>

  <hr>

  <p class="section-label">Banco / Billetera</p>
  <div class="chips" id="banks">
    <span class="chip active" data-val="Galicia">Galicia</span>
    <span class="chip active" data-val="Santander">Santander</span>
    <span class="chip active" data-val="Brubank">Brubank</span>
    <span class="chip active" data-val="Ualá">Ualá</span>
    <span class="chip active" data-val="Mercado Pago">Mercado Pago</span>
    <span class="chip active" data-val="Modo">Modo</span>
  </div>

  <p class="section-label" style="margin-top:0.75rem">Red de tarjeta</p>
  <div class="chips" id="cards">
    <span class="chip active" data-val="Visa">Visa</span>
    <span class="chip active" data-val="Mastercard">Mastercard</span>
    <span class="chip active" data-val="Amex">Amex</span>
  </div>

  <hr>

  <button class="search-btn" id="searchBtn" onclick="buscar()">Buscar promos de hoy</button>

  <div id="results"></div>

  <footer class="footer" style="margin-top:2rem">
    <a href="https://andifiorilli.github.io">andifiorilli.github.io</a>
  </footer>
</div>

<div id="claude-panel">
  <div class="claude-box">
    <h2>Resultados</h2>
    <div class="claude-msg" id="claude-msg">Buscando...</div>
    <button class="claude-close" onclick="cerrarPanel()">Cerrar</button>
  </div>
</div>

<script>
  // Fecha de hoy
  const hoy = new Date();
  document.getElementById('fecha').textContent = hoy.toLocaleDateString('es-AR', {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  // Chips toggle
  document.querySelectorAll('.chip:not(.disabled)').forEach(c => {
    c.addEventListener('click', () => c.classList.toggle('active'));
  });

  function getActive(id) {
    return [...document.querySelectorAll(`#${id} .chip.active`)].map(c => c.dataset.val).filter(Boolean);
  }

  async function buscar() {
    const cats = getActive('cats');
    const banks = getActive('banks');
    const cards = getActive('cards');

    if (!cats.length) {
      alert('Seleccioná al menos una categoría.');
      return;
    }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Buscando...';

    const fechaStr = hoy.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const catStr = cats.join(' y ');
    const bankStr = [...banks, ...cards].join(', ');

    const prompt = `Sos un asistente especializado en descuentos en Argentina. Hoy es ${fechaStr}.

Buscá en internet las promociones vigentes HOY en Argentina para:
- Categorías: ${catStr}
- Bancos, billeteras y redes de tarjeta: ${bankStr}

Para cada promo real que encuentres respondé SOLO con un JSON array sin texto extra, sin markdown:
[{"titulo":"...","descripcion":"...","categoria":"supermercados o delivery","banco":"...","link":"url o null","dias":"días en que aplica","tope":"tope o sin tope"}]

Solo JSON, nada más.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1500,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      let texto = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
      const match = texto.match(/\[[\s\S]*\]/);
      const promos = match ? JSON.parse(match[0]) : [];
      renderCards(promos);

    } catch(e) {
      renderError();
    }

    btn.disabled = false;
    btn.textContent = 'Buscar de nuevo';
  }

  function renderCards(promos) {
    const el = document.getElementById('results');
    if (!promos.length) {
      el.innerHTML = '<p class="status">No encontré promos confirmadas para los filtros seleccionados. Cambiá los filtros o intentá más tarde.</p>';
      return;
    }
    const html = promos.map(p => {
      const badgeClass = p.categoria === 'delivery' ? 'badge-delivery' : 'badge-super';
      const badgeLabel = p.categoria === 'delivery' ? 'Delivery' : 'Supermercado';
      const linkHtml = p.link
        ? `<a href="${p.link}" class="card-link" target="_blank">Ver promo →</a>`
        : `<span style="font-size:12px;color:var(--text-faint)">${p.dias || ''}</span>`;
      return `
        <div class="card">
          <div class="card-top">
            <p class="card-title">${p.titulo}</p>
            <span class="badge ${badgeClass}">${badgeLabel}</span>
          </div>
          <p class="card-desc">${p.descripcion}</p>
          <div class="card-tags">
            <span class="tag">${p.banco}</span>
            ${p.tope ? `<span class="tag tag-hi">${p.tope}</span>` : ''}
            ${p.dias ? `<span class="tag">${p.dias}</span>` : ''}
          </div>
          ${linkHtml}
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="cards">${html}</div>
      <p class="disclaimer">Verificá condiciones en el sitio de cada banco o comercio antes de usar la promo. Datos obtenidos mediante búsqueda web en tiempo real.</p>`;
  }

  function renderError() {
    document.getElementById('results').innerHTML = '<p class="status">Error al conectar. Esta herramienta requiere una API key de Anthropic configurada en el servidor. Contactá al desarrollador.</p>';
  }

  function cerrarPanel() {
    document.getElementById('claude-panel').classList.remove('open');
  }
</script>
</body>
</html>
