<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andi Fiorilli</title>
<link rel="stylesheet" href="style.css">    

<style>

:root{
    --white:#ffffff;
    --gray:#f2f2f2;
    --black:#111111;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:var(--gray);
    color:var(--black);
}

.header{
    position:sticky;
    top:0;
    z-index:100;
    background:var(--white);
    padding:20px 30px;
    border-bottom:1px solid #e5e5e5;

    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
}

.name{
    font-size:18px;
}

.logo{
    text-align:center;
}

.logo img{
    height:50px;
    width:auto;
    display:block;
}

.links{
    justify-self:end;
    display:flex;
    gap:20px;
}

.links a{
    color:var(--black);
    text-decoration:none;
}

.links a:hover{
    opacity:.6;
}

.gallery{
    width:100%;
    padding:14px;

    column-count:3;
    column-gap:14px;
}

.project{
    display:inline-block;
    width:100%;
    margin-bottom:14px;

    text-decoration:none;
    color:var(--black);
}

.thumb{
    width:100%;
    background:white;
    overflow:hidden;
}

.thumb img{
    width:100%;
    display:block;
}

.project-title{
    padding:10px 0 20px;
    font-size:14px;
}

.project:hover{
    opacity:.85;
}

.hero{
    aspect-ratio:16/9;
}

.vertical{
    aspect-ratio:4/5;
}

.square{
    aspect-ratio:1/1;
}

.placeholder{
    width:100%;
    height:100%;
    background:#e8e8e8;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#888;
    font-size:13px;
    letter-spacing:1px;
}

@media (max-width:1000px){

    .gallery{
        column-count:2;
    }

}

@media (max-width:700px){

    .header{
        grid-template-columns:1fr;
        gap:15px;
        text-align:center;
    }

    .name{
        order:1;
    }

    .logo{
        order:2;
    }

    .links{
        order:3;
        justify-self:center;
    }

    .gallery{
        column-count:1;
    }

}

</style>
</head>

<body>

<header class="header">

    <div class="name">
        Andi Fiorilli
    </div>

    <div class="logo">
        <img src="logo-DTS.svg" alt="Design Tomato Soup">
    </div>

    <div class="links">
        <a href="https://instagram.com/designtomatosoup" target="_blank">IG</a>
        <a href="https://www.linkedin.com/in/andresfiorilli/" target="_blank">LI</a>
    </div>

</header>

<section class="gallery">

    <a href="nb.html" class="project">

        <div class="thumb hero">
            <div class="placeholder">
                NOBILITAS BESTIARUM
            </div>
        </div>

        <div class="project-title">
            Nobilitas Bestiarum
        </div>

    </a>

    <a href="rusty-one.html" class="project">

        <div class="thumb square">
            <div class="placeholder">
                THE RUSTY ONE
            </div>
        </div>

        <div class="project-title">
            The Rusty One
        </div>

    </a>

    <a href="experimental.html" class="project">

        <div class="thumb vertical">
            <div class="placeholder">
                EXPERIMENTAL
            </div>
        </div>

        <div class="project-title">
            Experimental
        </div>

    </a>

</section>

</body>
</html>
